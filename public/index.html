<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Certificados</title>
  <style>
    body {
      background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #185a9d; text-align: center; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 2px solid #aad1ec;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg,#43cea2 0%,#185a9d 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { transform: translateY(-2px); }
    #resultado { margin-top: 20px; text-align: center; font-size: 14px; word-break: break-all; }
    #qr-section { text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📜 Guardar Certificado</h1>
    <form id="cert-form">
      <input type="text" id="nombre" placeholder="👤 Nombre completo" required>
      <input type="text" id="curso" placeholder="📚 Nombre del curso" required>
     <input type="text" id="nota" placeholder="⭐ Nota (Ej: 8, Excelente, Aprobado)" required>
      <input type="date" id="fecha" required>
      <input type="text" id="cid" placeholder="🔗 CID de Pinata (Qm... o bafy...)" required>
      <button type="submit">🚀 Enviar a Blockchain</button>
    </form>
    <div id="resultado"></div>
    <div id="qr-section"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
